<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miguel Mendoza Insurance | Farmers Insurance Agent</title>
  <meta
    name="description"
    content="Local, reliable insurance support from Miguel Mendoza with Daniel Dodge Insurance Agency. Serving California, Oregon, and Washington."
  />
  <style>
    :root {
      /* Farmers logo-inspired palette */
      --farmers-blue: #0b3f93;
      --farmers-blue-dark: #072b66;
      --farmers-blue-light: #d9e5f7;
      --farmers-red: #d7193f;
      --farmers-red-dark: #a90f2f;
      --soft-red: #fff2f5;
      --soft-blue: #eef5ff;
      --white: #ffffff;
      --gray-50: #f8fbff;
      --gray-100: #f4f7fb;
      --gray-200: #dfe7f2;
      --gray-500: #5d6b7b;
      --text: #1f2933;
      --shadow: 0 14px 34px rgba(7, 43, 102, 0.14);
      --radius: 18px;
      --max-width: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max-width), calc(100% - 2rem));
      margin: 0 auto;
    }

    .topbar {
      background: var(--farmers-blue-dark);
      color: var(--white);
      font-size: 0.95rem;
    }

    .topbar .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem 1.5rem;
      padding: 0.75rem 0;
      text-align: center;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--gray-200);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.95rem 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      min-width: 0;
</html>
